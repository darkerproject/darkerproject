<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Darker Project</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #fff; overflow-x: hidden;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 44px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 0.5px solid #e8e8e8;
}
.logo { color: #000; text-decoration: none; display: flex; align-items: center; z-index: 102; position: relative; }
#logo-img { height: 34px; width: auto; display: block; filter: brightness(0); }

#hamburger {
  background: none; border: none; cursor: pointer;
  width: 34px; height: 22px;
  display: flex; flex-direction: column; justify-content: space-between;
  z-index: 102; position: relative; padding: 0;
}
#hamburger span {
  display: block; width: 100%; height: 2px; background: #000;
  border-radius: 1px; transform-origin: center;
  transition: transform 0.45s cubic-bezier(0.23,1,0.32,1), opacity 0.3s ease;
}
#hamburger.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
#hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
#hamburger.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

#nav-overlay {
  position: fixed; top: 0; right: 110px; height: 64px; z-index: 101;
  display: flex; align-items: center;
  opacity: 0; pointer-events: none; transform: translateX(10px);
  transition: opacity 0.35s cubic-bezier(0.23,1,0.32,1), transform 0.35s cubic-bezier(0.23,1,0.32,1);
}
#nav-overlay.open { opacity: 1; pointer-events: all; transform: translateX(0); }
.nav-links { display: flex; gap: 32px; }
.nav-links a {
  font-size: 14px; color: #000; text-decoration: none;
  opacity: 0; transform: translateX(8px);
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.23,1,0.32,1);
}
.nav-links a:hover { opacity: 0.45 !important; }
#nav-overlay.open .nav-links a { opacity: 1; transform: translateX(0); }
#nav-overlay.open .nav-links a:nth-child(1) { transition-delay:.03s; }
#nav-overlay.open .nav-links a:nth-child(2) { transition-delay:.07s; }
#nav-overlay.open .nav-links a:nth-child(3) { transition-delay:.11s; }
#nav-overlay.open .nav-links a:nth-child(4) { transition-delay:.15s; }
#nav-overlay.open .nav-links a:nth-child(5) { transition-delay:.19s; }

/* ── HERO ── */
#hero {
  height: 25vh; min-height: 140px;
  display: flex; align-items: center; justify-content: center;
  padding-top: 64px;
}
#hero h1 {
  font-weight: 700; font-size: clamp(48px, 7vw, 96px);
  letter-spacing: -3px; color: #111; line-height: 1;
}



/* ── 3-COLUMN GRID ── ultra thin white gaps, no radius, wider */
#gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: #fff;
  padding: 0;
}

.gi {
  aspect-ratio: 16 / 10;
  overflow: hidden;
  cursor: pointer;
  background: #111;
  border-radius: 0;
}
.gi img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.55s cubic-bezier(0.23,1,0.32,1), filter 0.3s ease;
}
.gi:hover img { transform: scale(1.04); filter: brightness(0.85); }

/* ── LIGHTBOX ── */
#lightbox {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  background: rgba(0,0,0,0);
  transition: opacity 0.4s ease, background 0.4s ease;
  backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
}
#lightbox.open {
  opacity: 1; pointer-events: all;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
#lightbox-img {
  max-width: 90vw; max-height: 88vh;
  border-radius: 14px; object-fit: contain;
  transform: scale(0.94);
  transition: opacity 0.15s ease, transform 0.4s cubic-bezier(0.23,1,0.32,1);
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
#lightbox.open #lightbox-img { transform: scale(1); }
#lightbox-close {
  position: absolute; top: 28px; right: 36px;
  background: none; border: none; cursor: pointer;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
}
#lightbox-close::before, #lightbox-close::after {
  content: ''; position: absolute;
  width: 24px; height: 1.5px; background: rgba(255,255,255,0.8); border-radius: 1px;
}
#lightbox-close::before { transform: rotate(45deg); }
#lightbox-close::after  { transform: rotate(-45deg); }
#lightbox-close:hover::before, #lightbox-close:hover::after { background: #fff; }
#lightbox-prev, #lightbox-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.12); border: none; cursor: pointer;
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s ease;
}
#lightbox-prev { left: 28px; }
#lightbox-next { right: 28px; }
#lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.22); }
#lightbox-prev svg, #lightbox-next svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }
#lightbox-counter {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 12px; letter-spacing: 0.1em; color: rgba(255,255,255,0.5);
}

/* ── FOOTER ── */
#footer {
  background: #eceef0;
  padding: 48px 60px 32px;
  text-align: center;
}
.footer-socials {
  display: flex; justify-content: center; align-items: center;
  gap: 28px; margin-bottom: 28px;
}
.footer-socials a { color: #777; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; transition: opacity 0.2s ease; display: flex; align-items: center; }
.footer-socials a:hover { opacity: 0.4; }
.footer-socials svg { width: 20px; height: 20px; fill: #777; }
.footer-links {
  display: flex; justify-content: center; flex-wrap: wrap;
  gap: 8px 32px; margin-bottom: 20px;
}
.footer-links a {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px; letter-spacing: 0.04em; text-transform: none;
  color: #777; text-decoration: none; transition: opacity 0.2s ease;
}
.footer-links a:hover { opacity: 0.4; }
.footer-copy {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 0.02em;
  color: #777;
  text-transform: none;
}

/* ── FLOATING PILL ── */
#pill {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-16px);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 8px 8px 8px 22px;
  border-radius: 999px;
  width: clamp(260px, 34vw, 460px);
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    0 4px 16px rgba(0,0,0,0.10),
    0 16px 40px rgba(0,0,0,0.10),
    0 32px 64px rgba(0,0,0,0.06);
  border: 0.5px solid rgba(200,210,220,0.5);
  transition:
    opacity 0.2s cubic-bezier(0.23,1,0.32,1),
    transform 0.2s cubic-bezier(0.23,1,0.32,1);
}
#pill.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.pill-label {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: -0.3px;
  color: #111; white-space: nowrap;
}
.pill-btn {
  background: #0057FF; color: #fff; border: none;
  border-radius: 999px; padding: 9px 18px;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(0,87,255,0.30);
  transition: background 0.2s ease;
}
.pill-btn:hover { background: #3378ff; }

/* ── HEADER DARK STATE (when gallery is visible) ── */
#header.dark-mode {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom-color: rgba(255,255,255,0.08);
  transition: background 0.2s ease, border-color 0.2s ease;
}
#header.dark-mode #logo-img { filter: brightness(0) invert(1); }
#header.dark-mode #hamburger span { background: #fff; }
#header { transition: background 0.2s ease, border-color 0.2s ease; }
#nav-overlay { isolation: isolate; }

/* Nav links color set via JS based on header state */
#nav-overlay { background: transparent; }
#nav-overlay.open { background: transparent; }
#nav-overlay .nav-links a { color: #000; transition: color 0.2s ease, opacity 0.35s ease, transform 0.35s cubic-bezier(0.23,1,0.32,1); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  #header { padding: 0 20px; }
  #nav-overlay { right: 20px; }
  #gallery { grid-template-columns: repeat(2, 1fr); gap: 2px; }
  #lightbox-prev, #lightbox-next { display: none; }
}
</style>
</head>

<script>

var hamburger  = document.getElementById('hamburger');
var navOverlay = document.getElementById('nav-overlay');

/* ── PILL ── */
var pill = document.getElementById('pill');
var hero = document.getElementById('hero');
var header = document.getElementById('header');
var gallery = document.getElementById('gallery');

var navLinks = document.querySelectorAll('#nav-overlay .nav-links a');
var logoImg  = document.getElementById('logo-img');

new IntersectionObserver(function(entries) {
  var heroGone = !entries[0].isIntersecting;
  pill.classList.toggle('visible', heroGone);
  header.classList.toggle('dark-mode', heroGone);

  // Nav links color
  navLinks.forEach(function(a) { a.style.color = heroGone ? '#fff' : '#000'; });
  // Logo
  logoImg.style.filter = heroGone ? 'brightness(0) invert(1)' : 'brightness(0)';
  // Hamburger
  hamburger.querySelectorAll('span').forEach(function(s) { s.style.background = heroGone ? '#fff' : '#000'; });
}, { threshold: 0.05, rootMargin: '0px 0px -10px 0px' }).observe(hero);


hamburger.addEventListener('click', function() {
  var open = hamburger.classList.toggle('open');
  navOverlay.classList.toggle('open', open);
});
navOverlay.querySelectorAll('a').forEach(function(a) {
  a.addEventListener('click', function() {
    hamburger.classList.remove('open');
    navOverlay.classList.remove('open');
  });
});

var items    = Array.from(document.querySelectorAll('.gi'));
var srcs     = items.map(function(el) { return el.querySelector('img').src; });
var lightbox = document.getElementById('lightbox');
var lbImg    = document.getElementById('lightbox-img');
var lbClose  = document.getElementById('lightbox-close');
var lbPrev   = document.getElementById('lightbox-prev');
var lbNext   = document.getElementById('lightbox-next');
var lbCount  = document.getElementById('lightbox-counter');
var cur      = 0;

function openLB(i) {
  cur = i; lbImg.src = srcs[cur];
  lbCount.textContent = (cur+1) + ' / ' + srcs.length;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function(){ lbImg.src=''; }, 400);
}
function nextLB() {
  cur = (cur+1) % srcs.length; lbImg.style.opacity='0';
  setTimeout(function(){ lbImg.src=srcs[cur]; lbCount.textContent=(cur+1)+' / '+srcs.length; lbImg.style.opacity='1'; }, 150);
}
function prevLB() {
  cur = (cur-1+srcs.length) % srcs.length; lbImg.style.opacity='0';
  setTimeout(function(){ lbImg.src=srcs[cur]; lbCount.textContent=(cur+1)+' / '+srcs.length; lbImg.style.opacity='1'; }, 150);
}

items.forEach(function(el,i){ el.addEventListener('click', function(){ openLB(i); }); });
lbClose.addEventListener('click', closeLB);
lbNext.addEventListener('click', nextLB);
lbPrev.addEventListener('click', prevLB);
lightbox.addEventListener('click', function(e){ if(e.target===lightbox) closeLB(); });
// Touch swipe for mobile
var touchStartX = 0;
lbImg.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
lbImg.addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextLB(); else prevLB();
  }
}, { passive: true });
// Also allow swipe anywhere on lightbox overlay
lightbox.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
lightbox.addEventListener('touchend', function(e) {
  if (e.target === lightbox) { closeLB(); return; }
  var diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextLB(); else prevLB();
  }
}, { passive: true });

document.addEventListener('keydown', function(e){
  if(!lightbox.classList.contains('open')) return;
  if(e.key==='Escape') closeLB();
  if(e.key==='ArrowRight') nextLB();
  if(e.key==='ArrowLeft') prevLB();
});
